version: "3.9"

services:
 
   shortener:
       build: ./SHORTENER_SVC
       container_name: shortener_svc
       ports:
        - "8000:8000"
       env_file:
        - .env
        

   redirect:
       build: ./REDIRECT_SVC
       container_name: redirect_svc
       ports:
        - "8001:8001"
       env_file:
        - .env

   redis:
       image: redis:7
       container_name: url_shortener_redis
       ports:
        - "6379:6379"
