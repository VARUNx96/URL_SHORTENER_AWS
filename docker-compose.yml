version: "3.9"

services:
 
   shortener:
       build: ./SHORTENER_SVC
       container_name: shortener_svc
       ports:
        - "8000:8000"
       volumes:
        - db_data:/data
       working_dir: /app
       command: python -m uvicorn main:app --host 0.0.0.0 --port 8000

   redirect:
       build: ./REDIRECT_SVC
       container_name: redirect_svc
       ports:
        - "8001:8001"
       volumes:
        - db_data:/data
       working_dir: /app
       command: python -m uvicorn main:app --host 0.0.0.0 --port 8001

   redis:
       image: redis:7
       container_name: url_shortener_redis
       ports:
        - "6379:6379"

volumes:
  db_data:
